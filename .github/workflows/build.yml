name: Build EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller mss discord.py requests

      - name: Build EXE
        run: pyinstaller --onefile --noconsole main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v3
        with:
          name: screenshot-bot
          path: dist/main.exe
